<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="grid-wrapper">
      <!--Nav Bar-->
      <div class="nav-bar">
        <img
          src="assets/zamas-logo.png"
          alt="Zama's Organic skincare Logo"
          class="logo"
        />
        <img src="assets/menu-icon.png" id="btn-menu" />
      </div>
      <div class="sidebar-list">
        <div>
          <a href="#"
            ><img
              src="assets/icons-close-sidebar.gif"
              alt="Close"
              id="btn-close-sidebar"
          /></a>
        </div>
        <div class="menu-item">
          <a href="index.html"
            ><img src="assets/icons-home.png" alt="Home" />Home</a
          >
        </div>
        <div class="menu-item">
          <a href="index.html"
            ><img
              src="assets/icons-catalogue.png"
              alt="Catalogue"
            />Catalogue</a
          >
        </div>
        <div class="menu-item">
          <a href="cart.html"
            ><img src="assets/icons-cart.png" alt="cart" />Cart</a
          >
        </div>
        <div class="menu-item">
          <a href="#"><img src="assets/icons-about.png" alt="About" />About</a>
        </div>
      </div>

      <section class="products-wrapper">
        <h2>Checkout</h2>
        <hr />
        <h3>Billing Details</h3>
        <div class="form-wrapper">
          <!--Description of the product-->
          <form action="" class="form">
            <div class="form-inputs">
              <input
                type="text"
                name="name"
                id="firstName"
                placeholder="First name"
                required
              />
            </div>
            <div class="form-inputs">
              <input
                type="text"
                name="name"
                id="lastName"
                placeholder="Last name"
                required
              />
            </div>
            <div class="form-inputs">
              <input
                type="text"
                name="name"
                id="cellNumber"
                placeholder="Phone"
                required
              />
            </div>
            <div class="form-inputs">
              <input
                type="text"
                name="name"
                id="paxiCode"
                placeholder="Paxi code"
                required
              />
            </div>

            <div class="paxiDays">
              <label for="paxiDays">Choose paxi days:</label>
              <select name="paxiDays" id="paxiDays" class="paxiDays">
                <option value="3-5 Days">7 - 9 Days (R60)</option>
                <option value="5-7 Days">3 - 5 Days (R100)</option>
              </select>
            </div>
          </form>
        </div>
      </section>
      <hr />
      <div class="your-order-wrapper">
        <!--I will generate it here-->
      </div>

      <!--Footer-->
      <section class="footer">
        <div class="footer-wrapper">
          <p class="footer-header">Contact us</p>
          <img src="assets/whatsapp-logo.png" alt="WhatsApp logo" />
          <p class="cell-number">083-725-7917</p>
          <p class="footer-text">
            ©Zama’s Organic Skincare products. All rights reserved | Developed
            with 🤍 by
            <a href="https://siyabonga-zindela-portfolio.netlify.app/"
              >Siyabonga Zindela</a
            >
          </p>
        </div>
      </section>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
